apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "fluvio.serviceAccountName" . }}
  labels:
    {{- include "fluvio.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources:
    - pods
    - services
    - persistentvolumeclaims
    - persistentvolumes
    - configmaps
    - namespaces
  verbs: ["*"]
- apiGroups: ["apps"]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["fluvio.infinyon.com"]
  resources: ["*"]
  verbs: ["*"]
