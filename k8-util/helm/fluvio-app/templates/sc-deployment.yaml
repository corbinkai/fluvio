apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluvio-sc
  labels:
    {{- include "fluvio.labels" . | nindent 4 }}
    app.kubernetes.io/component: sc
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fluvio.sc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fluvio.sc.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "fluvio.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scPod.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scPod.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      containers:
        - name: fluvio-sc
          image: {{ include "fluvio.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.scPod.resources | nindent 12 }}
          ports:
            - name: public
              containerPort: 9003
            - name: internal
              containerPort: 9004
          env:
            - name: RUST_LOG
              value: {{ .Values.scLog }}
            {{- if .Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.scServiceName | default "fluvio-sc" | quote }}
            {{- end }}
            {{- if and .Values.uptrace.endpoint .Values.uptrace.tokenSecret }}
            - name: UPTRACE_ENDPOINT
              value: {{ .Values.uptrace.endpoint | quote }}
            - name: UPTRACE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.uptrace.tokenSecret }}
                  key: {{ .Values.uptrace.tokenKey }}
            {{- end }}
            {{- with .Values.scPod.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          command: ["/fluvio-run", "sc"]
          args:
            - --k8
        {{- if .Values.tls }}
            - --tls
            - --enable-client-cert
            - --ca-cert
            - /var/certs/ca/ca.crt
            - --server-cert
            - /var/certs/tls/tls.crt
            - --server-key
            - /var/certs/tls/tls.key
            - --secret-name
            - {{ .Values.cert.tls }}
            - --bind-non-tls-public
            - 0.0.0.0:9005
            {{- if .Values.authorizationConfigMap }}
            - --authorization-policy
            - /etc/fluvio/authorization/policy.json
            - --authorization-scopes
            - /etc/fluvio/authorization/scopes.json
            {{- end }}
          volumeMounts:
            - name: cacert
              mountPath: /var/certs/ca
              readOnly: true
            - name: tls
              mountPath: /var/certs/tls
            {{- if .Values.authorizationConfigMap }}
            - name: authorization-config
              mountPath: /etc/fluvio/authorization
            {{- end }}
            {{- with .Values.scPod.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- else if .Values.scPod.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml .Values.scPod.extraVolumeMounts | nindent 12 }}
        {{- end }}
        {{- with .Values.scPod.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
      {{- if .Values.tls }}
        - name: cacert
          secret:
            secretName: {{ .Values.cert.caCert }}
        - name: tls
          secret:
            secretName: {{ .Values.cert.tls }}
        {{- if .Values.authorizationConfigMap }}
        - name: authorization-config
          configMap:
            name: {{ .Values.authorizationConfigMap }}
            items:
            - key: POLICY
              path: policy.json
            - key: SCOPES
              path: scopes.json
        {{- end }}
      {{- end }}
        {{- with .Values.scPod.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
