name: Build & Push

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Comma-separated build platforms (e.g. linux/arm64,linux/amd64)'
        required: false
        default: 'linux/arm64'

env:
  REGISTRY: ghcr.io
  IMAGE_FLUVIO: koshee-ai/fluvio
  IMAGE_NAMESPACE_GC: koshee-ai/fluvio-namespace-gc

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.89.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all --all-features --tests -- -D warnings -A clippy::upper_case_acronyms

      - name: Doc
        run: cargo doc --no-deps

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.89.0"

      - uses: Swatinem/rust-cache@v2

      - name: Unit tests
        run: cargo test --lib --all-features

      - name: Doc tests
        run: cargo test --all-features --doc

  build-images:
    name: Build Images
    needs: [check, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: fluvio
            dockerfile: k8-util/docker/Dockerfile
          - image: namespace-gc
            dockerfile: k8-util/docker/Dockerfile.namespace-gc

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          SHA=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Determine image name
        id: image
        run: |
          if [ "${{ matrix.image }}" = "fluvio" ]; then
            echo "name=${{ env.IMAGE_FLUVIO }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ env.IMAGE_NAMESPACE_GC }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine platforms
        id: platforms
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.platforms }}" >> $GITHUB_OUTPUT
          else
            echo "value=linux/arm64" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ steps.platforms.outputs.value }}
          build-args: BUILD_MODE=zigbuild
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.sha }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
